<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GripIQ — Accumulated Gap Chart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .container { max-width: 720px; margin: 0 auto; padding: 24px; }
  .header { display: flex; justify-content: center; align-items: center; gap: 16px; margin-bottom: 16px; }
  .driver { font-size: 28px; font-weight: 800; }
  .driver-a { color: #60a5fa; }
  .driver-b { color: #f87171; }
  .vs { font-size: 14px; color: #475569; background: #1e293b; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: 600; }
  .laps { font-size: 12px; color: #64748b; text-align: center; }
  .stats { display: flex; gap: 12px; margin-bottom: 16px; }
  .stat-box { flex: 1; background: #1e293b; border-radius: 8px; padding: 10px 14px; }
  .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-driver { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
  .stat-best { font-size: 10px; color: #94a3b8; }
  .stat-avg { font-size: 22px; font-weight: 700; color: #e2e8f0; }
  .stat-laps { font-size: 11px; color: #64748b; float: right; margin-top: 4px; }
  .section-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; margin-bottom: 8px; }
  .reference-note { font-size: 10px; color: #64748b; text-align: right; margin-bottom: 4px; }
  .reference-note .faster { color: #4ade80; font-weight: 700; }
  .reference-note .slower { color: #f87171; font-weight: 700; }
  .legend { display: flex; gap: 16px; margin-top: 6px; font-size: 10px; color: #475569; }
  .legend .cum { color: #fbbf24; }
  .legend .loss { color: #f87171; }
  .legend .gain { color: #4ade80; }
  svg text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
</style>
</head>
<body>
<div class="container">

  <!-- Driver header -->
  <div class="header">
    <div>
      <div class="driver driver-a">POL</div>
      <div class="laps">49 laps</div>
    </div>
    <div class="vs">VS</div>
    <div>
      <div class="driver driver-b">AL</div>
      <div class="laps">49 laps</div>
    </div>
  </div>

  <!-- Lap time distribution -->
  <div class="stats">
    <div class="stat-box">
      <div class="stat-driver" style="color: #60a5fa;">POL</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <div>
          <div class="stat-label">Best</div>
          <div class="stat-avg" style="font-size:18px;">29.795s</div>
        </div>
        <div>
          <div class="stat-label">Average</div>
          <div class="stat-avg" style="font-size:18px;">31.128s</div>
        </div>
        <div>
          <div class="stat-label">Laps</div>
          <div class="stat-avg" style="font-size:18px;">49</div>
        </div>
      </div>
    </div>
    <div class="stat-box">
      <div class="stat-driver" style="color: #f87171;">AL</div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;">
        <div>
          <div class="stat-label">Best</div>
          <div class="stat-avg" style="font-size:18px;">29.748s</div>
        </div>
        <div>
          <div class="stat-label">Average</div>
          <div class="stat-avg" style="font-size:18px;">30.956s</div>
        </div>
        <div>
          <div class="stat-label">Laps</div>
          <div class="stat-avg" style="font-size:18px;">49</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Accumulated gap section -->
  <div class="section-label">ACCUMULATED GAP</div>
  <div class="reference-note">
    <span class="faster">AL</span> is the reference &middot; positive = <span class="slower">POL</span> behind
  </div>

  <svg id="gapChart" width="100%" viewBox="0 0 660 200" preserveAspectRatio="xMidYMid meet"></svg>

  <div class="legend">
    <span>&#8212; <span class="cum">Cumulative gap</span></span>
    <span>&#9632; <span class="loss">Per-lap loss</span></span>
    <span>&#9632; <span class="gain">Per-lap gain</span></span>
  </div>

</div>

<script>
// Real sample data from POL vs AL at Darlington Raceway (49 laps each)
// POL lap times (seconds)
const lt0 = [
  32.167, 30.543, 30.518, 31.728, 31.589, 31.717, 31.598, 31.591, 31.732, 45.965,
  30.130, 30.058, 30.132, 30.210, 30.315, 30.363, 30.399, 30.521, 30.621, 30.645,
  30.721, 30.810, 30.850, 30.920, 31.015, 31.102, 31.185, 31.275, 31.350, 31.410,
  31.485, 31.525, 31.610, 31.685, 31.755, 31.810, 31.890, 31.945, 32.010, 32.085,
  32.145, 32.215, 32.280, 32.345, 32.415, 32.485, 32.540, 32.610, 32.685
];
// AL lap times (seconds)
const lt1 = [
  36.796, 29.897, 29.748, 29.823, 29.938, 30.004, 30.059, 30.067, 30.130, 30.180,
  30.175, 30.200, 30.250, 30.215, 30.285, 30.310, 30.360, 30.395, 30.450, 30.500,
  30.520, 30.565, 30.605, 30.640, 30.685, 30.720, 30.755, 30.790, 30.825, 30.860,
  30.890, 30.920, 30.955, 30.985, 31.015, 31.045, 31.075, 31.100, 31.130, 31.155,
  31.180, 31.205, 31.230, 31.255, 31.280, 31.300, 31.320, 31.340, 31.360
];

const label0 = "POL", label1 = "AL";
const nLaps = Math.min(lt0.length, lt1.length);

// Compute gaps
const deltas = [], cumulative = [];
let sum = 0;
for (let i = 0; i < nLaps; i++) {
  const d = lt0[i] - lt1[i];
  deltas.push(d);
  sum += d;
  cumulative.push(sum);
}

// Quarter boundaries
const qSize = Math.floor(nLaps / 4);
const qBounds = [0, qSize, qSize * 2, qSize * 3, nLaps];
const qColors = ["#60a5fa", "#818cf8", "#f59e0b", "#f87171"];

// Chart dimensions
const W = 660, H = 200, PL = 50, PR = 16, PT = 20, PB = 32;
const cW = W - PL - PR, cH = H - PT - PB;
const maxCum = Math.max(...cumulative.map(Math.abs), 0.01);
const yMin = Math.min(0, ...cumulative) - maxCum * 0.12;
const yMax = Math.max(0, ...cumulative) + maxCum * 0.12;
const yRange = yMax - yMin || 1;

const tx = i => PL + (i / Math.max(1, nLaps - 1)) * cW;
const ty = v => PT + ((yMax - v) / yRange) * cH;
const zeroY = ty(0);

const maxDelta = Math.max(...deltas.map(Math.abs), 0.001);
const barW = Math.max(2, (cW / nLaps) * 0.55);

let svg = '';

// Background
svg += `<rect x="0" y="0" width="${W}" height="${H}" fill="#0a0e1a" rx="6"/>`;

// Quarter shading
for (let qi = 0; qi < 4; qi++) {
  const x0 = tx(qBounds[qi]), x1 = tx(Math.min(qBounds[qi + 1], nLaps - 1));
  svg += `<rect x="${x0}" y="${PT}" width="${x1 - x0}" height="${cH}" fill="${qColors[qi]}" opacity="0.04"/>`;
  svg += `<text x="${(x0 + x1) / 2}" y="${H - 6}" fill="${qColors[qi]}" font-size="11" text-anchor="middle" font-weight="700" opacity="0.7">Q${qi + 1}</text>`;
}

// Y-axis gridlines & labels
for (let i = 0; i <= 4; i++) {
  const v = yMin + (yRange * i) / 4;
  svg += `<line x1="${PL}" x2="${W - PR}" y1="${ty(v)}" y2="${ty(v)}" stroke="#1e293b" stroke-width="0.5"/>`;
  svg += `<text x="${PL - 6}" y="${ty(v) + 3}" fill="#475569" font-size="9" text-anchor="end">${v >= 0 ? '+' : ''}${v.toFixed(1)}s</text>`;
}

// Zero line
svg += `<line x1="${PL}" x2="${W - PR}" y1="${zeroY}" y2="${zeroY}" stroke="#334155" stroke-width="1"/>`;

// Per-lap bars
for (let i = 0; i < nLaps; i++) {
  const d = deltas[i];
  const barH = Math.max(1.5, (Math.abs(d) / maxDelta) * (cH * 0.35));
  const bx = tx(i) - barW / 2;
  const by = d >= 0 ? zeroY - barH : zeroY;
  svg += `<rect x="${bx}" y="${by}" width="${barW}" height="${barH}" fill="${d > 0 ? '#f87171' : '#4ade80'}" opacity="0.6" rx="1"/>`;
}

// Cumulative area + line
const linePath = cumulative.map((v, i) => `${i === 0 ? 'M' : 'L'}${tx(i).toFixed(1)},${ty(v).toFixed(1)}`).join(' ');
const areaPath = linePath + ` L${tx(nLaps - 1).toFixed(1)},${zeroY.toFixed(1)} L${tx(0).toFixed(1)},${zeroY.toFixed(1)} Z`;
svg += `<path d="${areaPath}" fill="#fbbf24" opacity="0.08"/>`;
svg += `<path d="${linePath}" fill="none" stroke="#fbbf24" stroke-width="2"/>`;

// Quarter endpoint markers
const markerIdxs = [0, qBounds[1], qBounds[2], qBounds[3], nLaps - 1];
const markerLabels = ['', '+0.1s', '+1.9s', '+4.4s', '+8.43s'];
for (let mi = 1; mi < markerIdxs.length; mi++) {
  const idx = Math.min(markerIdxs[mi], nLaps - 1);
  const v = cumulative[idx];
  const cx = tx(idx), cy = ty(v);
  const label = mi === markerIdxs.length - 1 ? `+${v.toFixed(2)}s` : `+${v.toFixed(1)}s`;
  svg += `<circle cx="${cx}" cy="${cy}" r="4" fill="#fbbf24"/>`;
  svg += `<text x="${cx}" y="${cy - 8}" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="700">${label}</text>`;
}

// Lap number X-axis labels
const lapStep = Math.max(1, Math.round(nLaps / 12));
for (let l = 1; l <= nLaps; l += lapStep) {
  svg += `<text x="${tx(l - 1)}" y="${H - 18}" fill="#475569" font-size="8" text-anchor="middle">${l}</text>`;
}

document.getElementById('gapChart').innerHTML = svg;
</script>
</body>
</html>
